<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DotPop!</title>

<style>

body{
margin:0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
background:#f5f7fb;
color:#333;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}

.container{
background:white;
padding:40px;
border-radius:16px;
max-width:500px;
width:90%;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
margin-top:0;
font-size:2.4rem;
color:#4a6cff;
}

p{
line-height:1.6;
}

.buttons{
margin-top:30px;
display:flex;
flex-direction:column;
gap:14px;
}

.button{
text-decoration:none;
padding:14px;
border-radius:10px;
font-weight:600;
transition:all .15s;
}

.play{
background:#4a6cff;
color:white;
}

.play:hover{
background:#3857d4;
}

.secondary{
color:#4a6cff;
}

footer{
margin-top:25px;
font-size:0.85rem;
color:#777;
}

</style>

</head>

<body>

<div class="container">

<h1>DotPop!</h1>

<p>
DotPop! is a fun and simple mobile game where players connect dots and compete to capture the most triangles on the board.
</p>

<div class="buttons">

<a class="button play"
href="https://play.google.com/store/apps/details?id=com.montanhajr.dotpop"
target="_blank">
View on Google Play
</a>

<a class="button secondary"
href="privacy-policy.html">
Privacy Policy
</a>

</div>

<footer>
© 2026 Mauricio Montanha Junior
</footer>

</div>

</body>
</html>
